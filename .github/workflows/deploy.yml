name: Deploy to Hugging Face Spaces

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Push code to Hugging Face Spaces
      env:
        HF_TOKEN: ${{ secrets.HF_TOKEN }}
        HF_USERNAME: ${{ secrets.HF_USERNAME }}
      run: |
        # Configure git
        git config --global user.email "ci@github.com"
        git config --global user.name "GitHub CI"
        
        # Clone with authentication
        git clone https://oauth2:$HF_TOKEN@huggingface.co/spaces/$HF_USERNAME/osteosarcoma-chatbot hf-space
        
        # Copy your files
        cp -r src pdfs requirements.txt .env .streamlit app.py README.md hf-space/ 2>/dev/null || true
        
        # Commit and push
        cd hf-space
        git add .
        git commit -m "Auto-deploy from GitHub CI [skip ci]" || echo "No changes to commit"
        git push https://oauth2:$HF_TOKEN@huggingface.co/spaces/$HF_USERNAME/osteosarcoma-chatbot main
